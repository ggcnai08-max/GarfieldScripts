<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpiritzMeScripts</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#0d0a1a;--pink-deep:#ff5c93;--pink:#ff8fb6;
  --mint:#8fe3c4;--mint-deep:#4fc9a0;--text-0:#f5e6ff;--text-1:#b89dc8;--text-2:#6b5080;
  --radius:22px;--radius-sm:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#0d0a1a;color:var(--text-0);font-family:'Nunito',sans-serif;min-height:100vh;position:relative;overflow-x:hidden;}
#spaceCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* candy — desktop only */
.candy{position:fixed;pointer-events:none;z-index:2;filter:drop-shadow(0 0 8px rgba(255,92,147,0.5));animation:float 6s ease-in-out infinite;opacity:0.85;}
.candy.c1{top:6%;left:4%;font-size:34px;animation-delay:0s;}
.candy.c2{top:14%;right:6%;font-size:28px;animation-delay:1.2s;}
.candy.c3{bottom:18%;left:3%;font-size:30px;animation-delay:2.1s;}
.candy.c4{bottom:8%;right:4%;font-size:26px;animation-delay:0.6s;}
.candy.c5{top:45%;left:1%;font-size:22px;animation-delay:1.8s;}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-14px) rotate(8deg);}}
@media(max-width:700px){.candy{display:none !important;}}

.wrap{max-width:720px;margin:0 auto;padding:28px 20px 60px;position:relative;z-index:3;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.brand{display:flex;align-items:center;gap:9px;font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;color:var(--pink);text-shadow:0 0 12px rgba(255,143,182,0.5);}
.brand .emoji{font-size:22px;}
.status-pill{font-size:12px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--mint-deep),#3ab8ff);padding:6px 13px;border-radius:99px;display:flex;align-items:center;gap:6px;box-shadow:0 3px 14px rgba(79,201,160,0.4);}
.banner{background:linear-gradient(135deg,rgba(255,92,147,0.12),rgba(255,92,147,0.05));border:1.5px solid rgba(255,143,182,0.3);border-radius:var(--radius);padding:16px 18px;margin-bottom:24px;display:flex;gap:14px;align-items:flex-start;backdrop-filter:blur(6px);}
.banner .icon{font-size:24px;flex-shrink:0;}
.banner-text{flex:1;min-width:0;}
.banner-title{font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;color:var(--pink);margin-bottom:4px;}
.banner-body{font-size:13px;color:var(--text-1);line-height:1.6;font-weight:600;}
.banner-links{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.chip{font-size:12px;font-weight:700;padding:7px 13px;border-radius:99px;border:none;color:#fff;text-decoration:none;background:linear-gradient(135deg,var(--pink-deep),#c0397a);transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 3px 10px rgba(255,92,147,0.4);display:inline-flex;align-items:center;gap:5px;}
.chip:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 6px 18px rgba(255,92,147,0.55);}
.hero{text-align:center;margin-bottom:24px;}
.mascot-wrap{width:130px;height:130px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;}
.mascot-wrap svg{width:100%;height:100%;filter:drop-shadow(0 0 18px rgba(255,143,182,0.4));}
.hero h1{font-family:'Fredoka',sans-serif;font-size:clamp(26px,6vw,34px);font-weight:700;color:#fff;line-height:1.25;margin-bottom:8px;text-shadow:0 0 20px rgba(255,143,182,0.4);}
.hero h1 .accent{color:var(--mint);text-shadow:0 0 14px rgba(143,227,196,0.6);}
.hero p{color:var(--text-1);font-size:14px;font-weight:600;max-width:480px;margin:0 auto;line-height:1.7;}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.step{background:rgba(26,19,40,0.8);backdrop-filter:blur(8px);border-radius:var(--radius-sm);padding:16px 14px;text-align:center;box-shadow:0 6px 20px rgba(0,0,0,0.4);border:1.5px solid rgba(255,143,182,0.15);}
.step .n{width:30px;height:30px;margin:0 auto 8px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--pink-deep));color:#fff;font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(255,92,147,0.4);}
.step .t{font-size:12.5px;color:var(--text-0);font-weight:700;line-height:1.5;}
@media(max-width:560px){.steps{grid-template-columns:1fr;}}
.section-label{font-family:'Fredoka',sans-serif;font-size:14px;font-weight:600;color:var(--pink);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.codebox{background:rgba(26,19,40,0.85);backdrop-filter:blur(10px);border:1.5px solid rgba(255,143,182,0.2);border-radius:var(--radius);overflow:hidden;margin-bottom:30px;box-shadow:0 10px 32px rgba(0,0,0,0.5);}
.codebox-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(255,92,147,0.08);border-bottom:1.5px solid rgba(255,143,182,0.15);}
.codebox-head .fname{font-size:13px;font-weight:700;color:var(--text-1);display:flex;align-items:center;gap:8px;}
.copy-btn{font-family:'Fredoka',sans-serif;font-size:13px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--mint-deep),#3ab8ff);border:none;padding:9px 18px;border-radius:99px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 4px 14px rgba(79,201,160,0.4);}
.copy-btn:hover{transform:translateY(-2px) scale(1.04);}
.copy-btn:active{transform:scale(0.98);}
.codebox pre{margin:0;padding:18px;font-family:'Consolas','Monaco',monospace;font-size:12.5px;line-height:1.7;color:#e8c4d8;overflow-x:auto;white-space:pre;background:rgba(10,6,22,0.6);}
.note{font-size:12px;font-weight:700;color:var(--text-2);background:rgba(26,19,40,0.6);backdrop-filter:blur(6px);border:1.5px dashed rgba(255,143,182,0.2);border-radius:var(--radius-sm);padding:12px 16px;line-height:1.7;margin-bottom:30px;}
.note b{color:var(--text-1);}
footer{border-top:1.5px dashed rgba(255,143,182,0.2);padding-top:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
footer .left{font-size:12px;color:var(--text-2);font-weight:700;}
footer .socials{display:flex;gap:10px;}
footer .socials a{color:var(--pink);text-decoration:none;font-size:12px;font-weight:700;padding:6px 12px;border:1.5px solid rgba(255,143,182,0.25);border-radius:99px;transition:background 0.15s;}
footer .socials a:hover{background:rgba(255,92,147,0.15);}

/* === TOAST === */
#toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
  background:linear-gradient(135deg,rgba(26,19,40,0.97),rgba(40,20,50,0.97));
  border:1.5px solid rgba(143,227,196,0.5);
  border-radius:99px;padding:12px 24px;
  display:flex;align-items:center;gap:10px;
  font-family:'Fredoka',sans-serif;font-size:15px;font-weight:600;color:#fff;
  box-shadow:0 8px 32px rgba(0,0,0,0.6),0 0 20px rgba(79,201,160,0.3);
  z-index:999;opacity:0;pointer-events:none;
  transition:opacity 0.25s ease,transform 0.25s ease;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast .t-icon{font-size:18px;}
#toast .t-text{color:var(--mint);}

/* === 404 === */
.page-404{display:none;text-align:center;padding:60px 20px;}
.page-404 .bear-404{width:160px;height:160px;margin:0 auto 20px;filter:drop-shadow(0 0 24px rgba(255,143,182,0.35));}
.page-404 h2{font-family:'Fredoka',sans-serif;font-size:clamp(28px,6vw,38px);color:#fff;margin-bottom:10px;}
.page-404 p{color:var(--text-1);font-size:14px;font-weight:600;line-height:1.8;max-width:400px;margin:0 auto 24px;}
.code-badge{display:inline-block;font-family:'Consolas',monospace;font-size:13px;background:rgba(255,92,147,0.12);border:1.5px solid rgba(255,143,182,0.3);border-radius:var(--radius-sm);padding:8px 16px;color:var(--pink);margin-bottom:24px;}
.btn-home{display:inline-flex;align-items:center;gap:8px;font-family:'Fredoka',sans-serif;font-size:15px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--pink-deep),#c0397a);border:none;padding:12px 24px;border-radius:99px;cursor:pointer;text-decoration:none;box-shadow:0 4px 16px rgba(255,92,147,0.45);transition:transform 0.15s;}
.btn-home:hover{transform:translateY(-2px);}
</style>
</head>
